services:
  # Servidor de Aplicación (Laravel + Vite)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: florentica-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
      - "5173:5173"
    command: >
      sh -c "npm install && 
             (npm run dev -- --host &) && 
             sleep 5 && 
             php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      - db
    networks:
      - florentica-network

  # Servidor de Base de Datos (MySQL)
  db:
    image: mysql:8.0
    container_name: florentica-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: florentica
      MYSQL_ROOT_PASSWORD: bollotech2026
    ports:
      - "3306:3306"
    volumes:
      - florentica-db-data:/var/lib/mysql
    networks:
      - florentica-network

networks:
  florentica-network:
    driver: bridge

volumes:
  florentica-db-data: